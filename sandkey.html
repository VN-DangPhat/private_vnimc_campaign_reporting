<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VChart Sankey (Import Style)</title>
  <style>
    body { margin: 0; background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
    .wrap { max-width: 1200px; margin: 20px auto; padding: 0 16px; }
    h2 { margin: 0 0 10px; }
    #chart { height: 680px; background: #111827; border: 1px solid #334155; border-radius: 10px; }
    #msg { margin-top: 10px; color: #fca5a5; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>VChart Sankey (How to Import VChart style)</h2>
    <div id="chart"></div>
    <div id="msg"></div>
  </div>

  <script type="module">
    const msg = document.getElementById('msg');
    const spec = {
      type: 'sankey',
      width: 'container',
      height: 680,
      data: [{
        id: 'sankey_data',
        values: [
          { from: 'Exposure', to: 'Click', value: 1200 },
          { from: 'Exposure', to: 'Skip', value: 520 },
          { from: 'Click', to: 'AddToCart', value: 760 },
          { from: 'Click', to: 'Bounce', value: 280 },
          { from: 'AddToCart', to: 'Checkout', value: 530 },
          { from: 'Checkout', to: 'Paid', value: 410 }
        ]
      }],
      sourceField: 'from',
      targetField: 'to',
      valueField: 'value',
      node: { style: { stroke: '#0b1220', lineWidth: 1, fillOpacity: 0.95 } },
      link: { style: { fillOpacity: 0.35 } },
      label: { visible: true, style: { fill: '#e2e8f0', fontSize: 12 } },
      tooltip: { visible: true }
    };

    async function loadVChart() {
      try {
        const mod = await import('https://unpkg.com/@visactor/vchart/esm/index.js');
        return mod.VChart || mod.default;
      } catch (e1) {
        const mod2 = await import('https://cdn.jsdelivr.net/npm/@visactor/vchart/esm/index.js');
        return mod2.VChart || mod2.default;
      }
    }

    try {
      const VChart = await loadVChart();
      if (!VChart) throw new Error('VChart export not found from CDN module');
      const chart = new VChart(spec, { dom: 'chart' });
      chart.renderSync();
      msg.style.color = '#86efac';
      msg.textContent = 'Rendered successfully. Updated at 2026-04-28 02:02:23';
    } catch (err) {
      msg.textContent = 'Render failed. Import CDN may be blocked: ' + (err?.message || String(err));
    }
  </script>
</body>
</html>
